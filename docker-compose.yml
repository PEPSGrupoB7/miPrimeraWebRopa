version: '3.8'

services:
  mariadb:
    image: mariadb:10.11
    container_name: mariadb-b7
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_USER_PASSWORD: ${MARIADB_USER_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./Chuches.sql:/docker-entrypoint-initdb.d/Chuches.sql:ro
    networks:
      - miprimeraweb-net

  phpmyadmin:
    image: phpmyadmin:5
    container_name: phpmyadmin-b7
    restart: unless-stopped
    environment:
      PMA_HOST: mariadb-b7
    ports:
      - "7107:80"  # acceso desde host
    depends_on:
      - mariadb
    networks:
      - miprimeraweb-net

  python:
    build: ./api
    container_name: python-b7
    restart: unless-stopped
    environment:
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      DB_HOST: mariadb-b7
      DB_PORT: 3306
      PORT: 8080
      HOST: 0.0.0.0
    depends_on:
      - mariadb
    networks:
      - miprimeraweb-net
    ports:
      - "9081:8080"

  apache-waf:
    build: ./apache
    container_name: apache-waf-b7
    restart: unless-stopped
    ports:
      - "6107:80"
    depends_on:
      - python
    networks:
      - miprimeraweb-net

volumes:
  mariadb_data:

networks:
  miprimeraweb-net:
    driver: bridge
